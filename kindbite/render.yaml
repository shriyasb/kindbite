# render.yaml — Render Blueprint (Infrastructure as Code)
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend (Node.js Web Service) ──────────────────────────────────────────
  - type: web
    name: kindbite-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/auth/me
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_EXPIRE
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false          # Set to your frontend Render URL after deploy

  # ── Frontend (Static Site) ──────────────────────────────────────────────────
  - type: web
    name: kindbite-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      # All routes fall back to index.html for React Router
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false          # Set to https://kindbite-backend.onrender.com/api
      - key: REACT_APP_SOCKET_URL
        sync: false          # Set to https://kindbite-backend.onrender.com
